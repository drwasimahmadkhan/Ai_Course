<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Mission Control — Russell & Norvig</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Syne:wght@700;800&family=Outfit:wght@500;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #020617;
      --card-bg: rgba(255, 255, 255, 0.03);
      --card-border: rgba(255, 255, 255, 0.08);
      --glass-bg: rgba(255, 255, 255, 0.02);
      --glass-border: rgba(255, 255, 255, 0.05);
      --accent: #38bdf8;
      --rainbow: linear-gradient(90deg, #fb923c, #facc15, #4ade80, #38bdf8, #a78bfa, #f472b6);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-font-smoothing: antialiased;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #010413;
      background-image:
        radial-gradient(at 0% 0%, hsla(253, 16%, 4%, 1) 0, transparent 50%),
        radial-gradient(at 50% 0%, hsla(225, 39%, 6%, 1) 0, transparent 50%),
        radial-gradient(at 100% 0%, hsla(339, 49%, 6%, 1) 0, transparent 50%);
      color: #f8fafc;
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── DASHBOARD LAYOUT ── */
    .dashboard {
      max-width: 1600px;
      margin: 0 auto;
      width: 100%;
      padding: 40px 40px 100px;
      display: flex;
      flex-direction: column;
      gap: 32px;
      flex: 1;
    }

    /* ── HERO SECTION ── */
    .hero {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 40px;
      border-bottom: 1px solid var(--glass-border);
      padding-bottom: 32px;
    }

    .hero-title {
      flex: 1;
    }

    .hero-title h1 {
      font-family: 'Syne', sans-serif;
      font-size: 56px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -2px;
      margin-bottom: 12px;
    }

    .rainbow-text {
      background: var(--rainbow);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-title p {
      font-family: 'Outfit', sans-serif;
      font-size: 16px;
      color: #94a3b8;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    .instructor-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: rgba(56, 189, 248, 0.05);
      border: 1px solid rgba(56, 189, 248, 0.1);
      border-radius: 100px;
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      margin-top: 16px;
    }

    /* ── STATS CARDS ── */
    .stats-group {
      display: flex;
      gap: 12px;
    }

    .stat-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      padding: 16px 24px;
      border-radius: 6px;
      text-align: center;
      min-width: 110px;
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
    }

    .stat-card:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(255, 255, 255, 0.15);
      transform: translateY(-4px);
      box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
    }

    .stat-card .value {
      display: block;
      font-size: 28px;
      font-weight: 800;
      font-family: 'Outfit', sans-serif;
      color: #fff;
      line-height: 1.2;
    }

    .stat-card .label {
      font-size: 10px;
      text-transform: uppercase;
      font-weight: 800;
      letter-spacing: 1px;
      color: #64748b;
    }

    .stat-card.active {
      border-color: rgba(74, 222, 128, 0.2);
      background: rgba(74, 222, 128, 0.03);
    }

    .stat-card.active .value {
      color: #4ade80;
    }

    /* ── FILTER SECTION ── */
    .filter-section {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .filter-label {
      font-size: 12px;
      font-weight: 800;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .filter-strip {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 8px;
    }

    .filter-strip::-webkit-scrollbar {
      height: 4px;
    }

    .filter-strip::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
    }

    .filter-btn {
      padding: 10px 20px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      color: #94a3b8;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .filter-btn:hover {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.15);
      color: #fff;
    }

    .filter-btn.active {
      background: #fff;
      color: #020617;
      border-color: #fff;
      box-shadow: 0 4px 20px rgba(255, 255, 255, 0.15);
    }

    .filter-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    /* ── CHAPTER GRID ── */
    .chapter-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      min-height: 400px;
    }

    .chapter-card {
      position: relative;
      background: rgba(30, 41, 59, 0.4);
      /* Slate-800 translucent */
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 6px;
      padding: 32px;
      text-decoration: none;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      min-height: 220px;
      overflow: hidden;
      backdrop-filter: blur(16px);
      box-shadow:
        0 4px 30px rgba(0, 0, 0, 0.1),
        0 0 0 1px rgba(255, 255, 255, 0.05) inset,
        0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }

    .chapter-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 0%, rgba(0, 0, 0, 0.6) 100%);
      opacity: 0.5;
      transition: opacity 0.3s;
    }

    .chapter-card:hover {
      transform: translateY(-12px) scale(1.03);
      border-color: rgba(255, 255, 255, 0.4);
      background: rgba(30, 41, 59, 0.6);
      box-shadow:
        0 25px 50px -12px rgba(0, 0, 0, 0.5),
        0 0 30px rgba(255, 255, 255, 0.15);
    }

    .chapter-card:hover::before {
      opacity: 1;
    }

    .card-accent {
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
      opacity: 0.05;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .chapter-card:hover .card-accent {
      opacity: 0.1;
    }

    .card-num {
      position: absolute;
      top: 32px;
      left: 32px;
      font-size: 11px;
      font-weight: 800;
      color: rgba(255, 255, 255, 0.4);
      letter-spacing: 2px;
      font-family: 'Outfit', sans-serif;
    }

    .card-icon {
      position: absolute;
      top: 24px;
      right: 32px;
      font-size: 32px;
      opacity: 0.8;
      transition: transform 0.3s;
    }

    .chapter-card:hover .card-icon {
      transform: scale(1.2) rotate(-10deg);
    }

    .card-content {
      position: relative;
      z-index: 2;
    }

    .card-title {
      font-family: 'Outfit', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      line-height: 1.2;
      margin-bottom: 8px;
    }

    .card-week {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.6);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .live-indicator {
      position: absolute;
      bottom: 32px;
      right: 32px;
      width: 8px;
      height: 8px;
      background: #4ade80;
      border-radius: 50%;
      box-shadow: 0 0 10px #4ade80;
      z-index: 3;
    }

    /* ── FOOTER MISSION CONTROL ── */
    .mission-control {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(2, 6, 23, 0.8);
      backdrop-filter: blur(20px);
      border-top: 1px solid var(--glass-border);
      padding: 16px 40px;
      display: flex;
      align-items: center;
      gap: 40px;
      z-index: 100;
    }

    .progress-track {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #64748b;
    }

    .progress-meta span:last-child {
      color: #4ade80;
    }

    .progress-bar-wrap {
      height: 6px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 100px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, #38bdf8, #818cf8, #4ade80);
      border-radius: 100px;
      box-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
    }

    .control-hint {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.3);
      text-align: right;
      font-weight: 500;
      line-height: 1.4;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .chapter-card {
      animation: fadeIn 0.5s ease backwards;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 1024px) {
      .hero {
        flex-direction: column;
        align-items: flex-start;
      }

      .hero-title h1 {
        font-size: 40px;
      }

      .chapter-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 640px) {
      .dashboard {
        padding: 24px 20px 120px;
      }

      .hero-title h1 {
        font-size: 32px;
        letter-spacing: -1px;
      }

      .chapter-grid {
        grid-template-columns: 1fr;
      }

      .mission-control {
        display: none;
      }

      .progress-meta {
        font-size: 10px;
        flex-direction: column;
        align-items: center;
        gap: 6px;
      }

      .control-hint {
        text-align: center;
      }

      .stats-group {
        flex-wrap: wrap;
        width: 100%;
        gap: 8px;
        padding-bottom: 0;
      }

      .stat-card {
        flex: 1 1 30%;
        min-width: 100px;
        padding: 12px;
      }

      .stat-card .value {
        font-size: 24px;
      }
    }
  </style>
</head>

<body>
  <div class="dashboard">
    <!-- HERO SECTION -->
    <header class="hero">
      <div class="hero-title">
        <h1>Artificial <span class="rainbow-text">Intelligence</span></h1>
        <p>Russell & Norvig · 4th Edition · BSCS Course Repository</p>
        <div class="instructor-badge">
          <span>👨‍🏫 Instructor: Dr. Wasim Ahmad Khan</span>
        </div>
      </div>
      <div class="stats-group">
        <div class="stat-card">
          <span class="value">29</span>
          <span class="label">Chapters</span>
        </div>
        <div class="stat-card">
          <span class="value">15</span>
          <span class="label">Weeks</span>
        </div>
        <div class="stat-card active">
          <span class="value">FULL</span>
          <span class="label">Course</span>
        </div>
      </div>
    </header>

    <!-- INTERACTIVE FILTER -->
    <div class="filter-section">
      <span class="filter-label">Exploration Modules</span>
      <div class="filter-strip" id="filterStrip">
        <button class="filter-btn active" onclick="filterChapters('all', this)">
          <div class="filter-dot" style="background: #fff"></div> All Units
        </button>
        <!-- Categories injected here -->
      </div>
    </div>

    <!-- CHAPTER GRID -->
    <div class="chapter-grid" id="chapterGrid">
      <!-- Chapters injected here -->
    </div>
  </div>

  <!-- MISSION CONTROL FOOTER -->
  <footer class="mission-control">
    <div class="progress-track">
      <div class="progress-meta">
        <span>System Readiness</span>
        <span>29 Chapters Active</span>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill"></div>
      </div>
    </div>
    <div class="control-hint">
      Access individual modules using the dash cards.<br>Designed for premium cognitive performance.
    </div>
  </footer>

  <script>
    const CHAPTERS = [
      { num: 1, title: "Introduction", icon: "🌟", hue: 355, week: 1, file: "week-01.html", part: 0 },
      { num: 2, title: "Intelligent Agents", icon: "🤖", hue: 14, week: 1, file: "week-01.html", part: 0 },
      { num: 3, title: "Solving Problems by Searching", icon: "🔍", hue: 28, week: 2, file: "week-02.html", part: 1 },
      { num: 4, title: "Search in Complex Environments", icon: "🗺️", hue: 42, week: 2, file: "week-02.html", part: 1 },
      { num: 5, title: "Constraint Satisfaction Problems", icon: "🧩", hue: 56, week: 3, file: "week-03.html", part: 1 },
      { num: 6, title: "Adversarial Search and Games", icon: "♟️", hue: 70, week: 3, file: "week-03.html", part: 1 },
      { num: 7, title: "Logical Agents", icon: "💡", hue: 90, week: 4, file: "week-04.html", part: 2 },
      { num: 8, title: "First-Order Logic", icon: "📐", hue: 110, week: 4, file: "week-04.html", part: 2 },
      { num: 9, title: "Inference in First-Order Logic", icon: "🔗", hue: 128, week: 5, file: "week-05.html", part: 2 },
      { num: 10, title: "Knowledge Representation", icon: "🗃️", hue: 148, week: 5, file: "week-05.html", part: 2 },
      { num: 11, title: "Automated Planning", icon: "📅", hue: 162, week: 6, file: "week-06.html", part: 2 },
      { num: 12, title: "Quantifying Uncertainty", icon: "🎲", hue: 178, week: 6, file: "week-06.html", part: 3 },
      { num: 13, title: "Probabilistic Reasoning", icon: "📊", hue: 194, week: 7, file: "week-07.html", part: 3 },
      { num: 14, title: "Probabilistic Reasoning over Time", icon: "⏳", hue: 210, week: 7, file: "week-07.html", part: 3 },
      { num: 15, title: "Making Simple Decisions", icon: "⚖️", hue: 222, week: 8, file: "week-08.html", part: 3 },
      { num: 16, title: "Making Complex Decisions", icon: "🧠", hue: 234, week: 8, file: "week-08.html", part: 3 },
      { num: 17, title: "Multiagent Decision Making", icon: "👥", hue: 246, week: 9, file: "week-09.html", part: 3 },
      { num: 18, title: "Probabilistic Programming", icon: "💻", hue: 258, week: 9, file: "week-09.html", part: 3 },
      { num: 19, title: "Learning from Examples", icon: "📖", hue: 270, week: 10, file: "week-10.html", part: 4 },
      { num: 20, title: "Knowledge in Learning", icon: "🌱", hue: 281, week: 10, file: "week-10.html", part: 4 },
      { num: 21, title: "Learning Probabilistic Models", icon: "📈", hue: 291, week: 11, file: "week-11.html", part: 4 },
      { num: 22, title: "Deep Learning", icon: "🕸️", hue: 301, week: 11, file: "week-11.html", part: 4 },
      { num: 23, title: "Reinforcement Learning", icon: "🎮", hue: 311, week: 12, file: "week-12.html", part: 4 },
      { num: 24, title: "Natural Language Processing", icon: "💬", hue: 321, week: 12, file: "week-12.html", part: 5 },
      { num: 25, title: "Deep Learning for NLP", icon: "🗣️", hue: 331, week: 13, file: "week-13.html", part: 5 },
      { num: 26, title: "Robotics", icon: "🦾", hue: 341, week: 13, file: "week-13.html", part: 5 },
      { num: 27, title: "Computer Vision", icon: "👁️", hue: 351, week: 14, file: "week-14.html", part: 5 },
      { num: 28, title: "Philosophy, Ethics & Safety of AI", icon: "🛡️", hue: 4, week: 14, file: "week-14.html", part: 6 },
      { num: 29, title: "The Future of AI", icon: "🚀", hue: 16, week: 15, file: "week-15.html", part: 6 },
    ];

    const PARTS = [
      { id: 0, label: "I · Foundations", hue: 355 },
      { id: 1, label: "II · Search", hue: 35 },
      { id: 2, label: "III · Knowledge", hue: 110 },
      { id: 3, label: "IV · Uncertainty", hue: 190 },
      { id: 4, label: "V · Learning", hue: 275 },
      { id: 5, label: "VI · Perception", hue: 326 },
      { id: 6, label: "VII · Conclusions", hue: 10 },
    ];

    const filterStrip = document.getElementById('filterStrip');
    const chapterGrid = document.getElementById('chapterGrid');

    // Generate Filter Buttons
    PARTS.forEach(part => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn';
      btn.onclick = (e) => filterChapters(part.id, e.currentTarget);
      btn.innerHTML = `<div class="filter-dot" style="background: hsl(${part.hue}, 80%, 60%)"></div> ${part.label}`;
      filterStrip.appendChild(btn);
    });

    function filterChapters(partId, activeBtn) {
      // Update active state
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      if (activeBtn) activeBtn.classList.add('active');
      else document.querySelector('.filter-btn').classList.add('active');

      renderGrid(partId);
    }

    function renderGrid(partId) {
      chapterGrid.innerHTML = '';
      const filtered = partId === 'all' ? CHAPTERS : CHAPTERS.filter(ch => ch.part === partId);

      filtered.forEach((ch, index) => {
        const card = document.createElement('a');
        card.href = ch.file;
        card.className = 'chapter-card';
        card.style.animationDelay = `${index * 0.05}s`;

        const accent = document.createElement('div');
        accent.className = 'card-accent';
        accent.style.background = `radial-gradient(circle at top right, hsl(${ch.hue}, 80%, 50%), transparent 70%)`;
        card.appendChild(accent);

        card.innerHTML += `
          <div class="card-num">MODULE ${String(ch.num).padStart(2, '0')}</div>
          <div class="card-icon">${ch.icon}</div>
          <div class="card-content">
            <h2 class="card-title">${ch.title}</h2>
            <div class="card-week">Week ${ch.week} Tutorial</div>
          </div>
          <div class="live-indicator"></div>
        `;
        chapterGrid.appendChild(card);
      });
    }

    // Initial render
    renderGrid('all');
  </script>
</body>

</html>
